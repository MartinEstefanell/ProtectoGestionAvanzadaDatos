services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - data

  nessie-db:
    image: postgres:14
    environment:
      POSTGRES_USER: ${NESSIE_DB_USER:-nessie}
      POSTGRES_PASSWORD: ${NESSIE_DB_PASSWORD:-password}
      POSTGRES_DB: ${NESSIE_DB_NAME:-nessie}
    volumes:
      - nessie_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NESSIE_DB_USER:-nessie} -d ${NESSIE_DB_NAME:-nessie}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data

  nessie:
    image: projectnessie/nessie:latest
    depends_on:
      nessie-db:
        condition: service_started
    environment:
      NESSIE_VERSION_STORE_TYPE: JDBC
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://nessie-db:5432/${NESSIE_DB_NAME:-nessie}
      QUARKUS_DATASOURCE_USERNAME: ${NESSIE_DB_USER:-nessie}
      QUARKUS_DATASOURCE_PASSWORD: ${NESSIE_DB_PASSWORD:-password}
      QUARKUS_PROFILE: prod
      QUARKUS_HTTP_PORT: 19120
    ports:
      - "19120:19120"
    networks:
      - data

  dremio:
    image: dremio/dremio-oss:latest
    hostname: dremio
    depends_on:
      minio:
        condition: service_started
      nessie:
        condition: service_started
    ports:
      - "9047:9047"
      - "31010:31010"
      - "32010:32010"
      - "45678:45678"
    environment:
      DREMIO_JAVA_EXTRA_OPTS: "-Dfs.s3a.path.style.access=true -Dfs.s3a.endpoint=http://minio:9000"
      DREMIO_JAVA_SERVER_EXTRA_OPTS: "-Dpaths.dist=file:///opt/dremio/data/dist -Ddremio.nessie.defaultBranch=main -Ddremio.nessie.authentication.enabled=false"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-password}
    volumes:
      - dremio_data:/opt/dremio/data
    networks:
      - data

networks:
  data:

volumes:
  minio_data:
  nessie_db_data:
  dremio_data:
